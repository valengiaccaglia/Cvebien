<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Received</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fb; }
        nav { background: #1e3a5f; padding: 14px 24px; display: flex; align-items: center; gap: 24px; }
        nav a { color: white; text-decoration: none; font-weight: 600; font-size: 15px; }
        nav a.secondary { color: #93c5fd; font-weight: 400; }
        .container { max-width: 720px; margin: 80px auto; background: white; border-radius: 18px; padding: 40px; box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08); }
        h1 { color: #111827; margin-bottom: 16px; }
        p { color: #4b5563; line-height: 1.8; margin-top: 12px; }
        .meta { margin-top: 24px; padding: 20px; background: #f8fafc; border-radius: 14px; border: 1px solid #e2e8f0; }
        .meta dt { font-weight: 700; color: #111827; margin-top: 14px; }
        .meta dt:first-child { margin-top: 0; }
        .meta dd { margin: 6px 0 0 0; color: #374151; }
        a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Threat Tracker</a>
    </nav>
    <div class="container">
        <h1>Subscription received</h1>
        <p>Thanks! You will receive an email when a new CVE matches your app and severity preferences.</p>

        <div class="meta">
            <dl>
                <dt>Email:</dt>
                <dd>{{ email }}</dd>
                <dt>Application / Library:</dt>
                <dd>{{ app_name }}</dd>
                <dt>Severities:</dt>
                <dd>{{ severities or 'Critical (default)' }}</dd>
            </dl>
        </div>

        <p><a href="/">← Back to home</a> &nbsp;·&nbsp; <a href="/cves">Browse CVEs</a></p>
    </div>
</body>
</html>
