<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fb; }
        nav { background: #1e3a5f; padding: 14px 24px; display: flex; align-items: center; gap: 24px; }
        nav a { color: white; text-decoration: none; font-weight: 600; font-size: 15px; }
        nav a.secondary { color: #93c5fd; font-weight: 400; }
        .container { max-width: 720px; margin: 80px auto; background: white; border-radius: 18px; padding: 40px; box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08); }
        h1 { color: #111827; margin-bottom: 16px; }
        p { color: #4b5563; line-height: 1.8; margin-top: 12px; }
        a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Threat Tracker</a>
    </nav>
    <div class="container">
        <h1>Unsubscribed successfully</h1>
        <p>Your subscription for <strong>{{ app_name }}</strong> has been deactivated for <strong>{{ email }}</strong>.</p>
        <p><a href="/">← Subscribe again</a></p>
    </div>
    <script>
        // Clear this subscription from localStorage so the UI reflects the change
        (function() {
            const unsubEmail = "{{ email }}";
            const unsubName  = "{{ app_name }}";
            try {
                const subs = JSON.parse(localStorage.getItem('threattracker_subs') || '{}');
                // Remove any key where the stored email matches AND the key loosely matches the app name
                const normalizedName = unsubName.toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
                Object.keys(subs).forEach(function(key) {
                    if (subs[key] !== unsubEmail) return;
                    const normalizedKey = key.toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
                    // Check if any word from the app name appears in the key or vice versa
                    const nameWords = normalizedName.split(' ').filter(Boolean);
                    const keyWords  = normalizedKey.split(' ').filter(Boolean);
                    const overlap   = nameWords.some(w => keyWords.includes(w)) || keyWords.some(w => nameWords.includes(w));
                    if (overlap) delete subs[key];
                });
                localStorage.setItem('threattracker_subs', JSON.stringify(subs));
            } catch(e) {}
        })();
    </script>
</body>
</html>
